name: Convert Markdown Resume with Pandoc Docker

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Convert README.md to Multiple Formats Using Pandoc in a Single Docker Run
        run: |
          docker run --rm \
            -v "$(pwd)":/repo \
            --workdir /repo \
            pandoc/core:latest \
            sh -c " \
              pandoc README.md -o README.pdf --pdf-engine=xelatex && \
              pandoc README.md -o README.docx && \
              pandoc README.md -o README.html \
            "

      - name: Commit and Push Generated Files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add README.pdf README.docx README.html
          git commit -m "Automated resume conversion via GitHub Actions"
          git push
