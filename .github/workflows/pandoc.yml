name: Convert Markdown Resume with Pandoc

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Pandoc and XeLaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex

      - name: Convert resume.tex to PDF using XeLaTeX
        run: |
          pandoc resume.tex -o README.pdf --pdf-engine=xelatex

      - name: Convert resume.tex to HTML using Pandoc
        run: |
          pandoc resume.tex -o resume.html

      - name: Convert resume.tex to Markdown using Pandoc
        run: |
          pandoc resume.tex -o resume.md

      - name: Commit and Push Generated Files [skip ci]
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add README.pdf resume.html resume.md
          if ! git diff-index --quiet HEAD; then
            git commit -m "Automated resume conversion via GitHub Actions [skip ci]"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main
          else
            echo "No changes to commit."
          fi
