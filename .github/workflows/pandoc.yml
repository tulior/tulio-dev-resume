name: Convert Markdown Resume with Pandoc Docker

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Verify README.md exists at the repository root
        run: |
          if [ ! -f README.md ]; then
            echo "Error: README.md not found at repository root!"
            exit 1
          fi
          ls -lah README.md

      - name: Convert README.md to PDF, DOCX, and HTML using Pandoc Docker
        run: |
          docker run --rm \
            -v "$(pwd)":/repo \
            --workdir /repo \
            pandoc/core:latest \
            sh -c '
              pandoc README.md -o README.pdf --pdf-engine=xelatex &&
              pandoc README.md -o README.docx &&
              pandoc README.md -o README.html
            '

      - name: Commit and Push Generated Files [skip ci]
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add README.pdf README.docx README.html
          # Commit only if there are changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "Automated resume conversion via GitHub Actions [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
