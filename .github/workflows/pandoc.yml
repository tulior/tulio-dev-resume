name: Convert Markdown Resume with Pandoc Docker

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest  # The GitHub Actions runner, required to execute Docker

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Convert README.md to PDF, DOCX, and HTML using Pandoc Docker
        run: |
          docker run --rm \
            -v "$(pwd)":/workspace \
            --workdir /workspace \
            pandoc/core:latest \
            pandoc README.md -o README.pdf --pdf-engine=xelatex
          
          docker run --rm \
            -v "$(pwd)":/workspace \
            --workdir /workspace \
            pandoc/core:latest \
            pandoc README.md -o README.docx

          docker run --rm \
            -v "$(pwd)":/workspace \
            --workdir /workspace \
            pandoc/core:latest \
            pandoc README.md -o README.html

      - name: Commit and Push Generated Files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add README.pdf README.docx README.html
          git commit -m "Automated resume conversion via GitHub Actions"
          git push
